# Dependabot configuration
# ---------------------------------------------------------
# Version-update PRs are DISABLED (open-pull-requests-limit: 0).
# Security-update PRs are a separate GitHub feature enabled in
# Settings → Code security and analysis → Dependabot security updates.
# Those still fire automatically when a CVE is published.
# ---------------------------------------------------------
version: 2
updates:
  # Maven — backend
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - backend

  # Maven — maintenance
  - package-ecosystem: maven
    directory: /maintenance
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - maintenance

  # npm — frontend
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - frontend

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - ci
