name: frontend-ci-cd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        default: production
        options:
          - production
          - arena-stress
          - arena-security

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test_frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          VITE_FD_BLOB_PREFIX: /blob/
          VITE_BLOB_BASE: ""
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy_frontend:
    runs-on: ubuntu-latest
    needs: test_frontend
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Upload assets to blob
        run: |
          az storage blob upload-batch \
            --account-name ${{ vars.STORAGE_ACCOUNT_NAME }} \
            --auth-mode login \
            --source dist/assets \
            --destination assets \
            --overwrite

      - name: Upload static_frontend to blob
        run: |
          if [ -d "dist/static_frontend" ]; then
            az storage blob upload-batch \
              --account-name ${{ vars.STORAGE_ACCOUNT_NAME }} \
              --auth-mode login \
              --source dist/static_frontend \
              --destination staticfrontend \
              --overwrite
          fi

      - name: Upload web root to blob
        run: |

          rm -rf dist/assets dist/static_frontend
          az storage blob upload-batch \
            --account-name ${{ vars.STORAGE_ACCOUNT_NAME }} \
            --auth-mode login \
            --source dist \
            --destination web \
            --overwrite

      - name: Purge CDN cache (fire-and-forget)
        run: |
          az afd endpoint purge \
            --resource-group ${{ vars.RG_NAME }} \
            --profile-name ${{ vars.FD_PROFILE_NAME }} \
            --endpoint-name ${{ vars.FD_ENDPOINT_NAME }} \
            --domains ${{ vars.FD_ENDPOINT_HOSTNAME }} \
            --content-paths "/*" \
            --no-wait
