name: frontend-ci-cd

on:
  push:
    paths:
      - 'task-manager-frontend/**'
  workflow_dispatch:

jobs:
  test_frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: task-manager-frontend/task-manager-app-frontend
        run: npm ci

      - name: Lint
        working-directory: task-manager-frontend/task-manager-app-frontend
        run: npm run lint

      - name: Build
        working-directory: task-manager-frontend/task-manager-app-frontend
        env:
          VITE_FD_BLOB_PREFIX: /blob/
          VITE_BLOB_BASE: ""
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-dist
          path: task-manager-frontend/task-manager-app-frontend/dist

  deploy_frontend:
    runs-on: ubuntu-latest
    needs: test_frontend
    if: ${{ needs.test_frontend.result == 'success' && github.ref == 'refs/heads/main' && false }}

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Download dist artifact
        uses: actions/download-artifact@v3
        with:
          name: frontend-dist
          path: dist

      # ── Upload hashed Vite assets to 'assets' container ──
      - name: Upload assets to blob
        run: |
          az storage blob upload-batch \
            --account-name anstaskmanagerstorage \
            --account-key "${{ secrets.STORAGE_ACCOUNT_KEY }}" \
            --source dist/assets \
            --destination assets \
            --overwrite

      # ── Upload static_frontend (favicons, icons, etc.) to 'staticfrontend' container ──
      - name: Upload static_frontend to blob
        run: |
          if [ -d "dist/static_frontend" ]; then
            az storage blob upload-batch \
              --account-name anstaskmanagerstorage \
              --account-key "${{ secrets.STORAGE_ACCOUNT_KEY }}" \
              --source dist/static_frontend \
              --destination staticfrontend \
              --overwrite
          fi

      # ── Upload remaining files (index.html, etc.) to 'web' container ──
      - name: Upload web root to blob
        run: |
          # Remove folders already uploaded as separate containers
          rm -rf dist/assets dist/static_frontend
          az storage blob upload-batch \
            --account-name anstaskmanagerstorage \
            --account-key "${{ secrets.STORAGE_ACCOUNT_KEY }}" \
            --source dist \
            --destination web \
            --overwrite