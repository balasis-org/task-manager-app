name: backend-ci-cd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'contracts/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        default: production
        options:
          - production
          - arena-stress
          - arena-security

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test_backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build contract dependency first
        run: |
          mvn -f contracts/pom.xml clean install

      - name: Build and run tests with H2
        run: |
          mvn -f backend/pom.xml clean test \
            -Dspring.profiles.active="dev-h2"

  deploy_backend:
    runs-on: ubuntu-latest
    needs: test_backend
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build contract dependency first
        run: |
          mvn -f contracts/pom.xml clean install

      - name: Create package
        run: |
          mvn -f backend/pom.xml clean package -DskipTests

      - name: Set image tag
        run: echo "IMAGE_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build Docker image
        run: |
          docker build -t ${{ vars.ACR_LOGIN_SERVER }}/taskmanager-backend:$IMAGE_TAG backend

      - name: Push Docker image
        run: |
          docker push ${{ vars.ACR_LOGIN_SERVER }}/taskmanager-backend:$IMAGE_TAG

      - name: Change the image of backend web app service
        run: |
          az webapp config container set \
            --name ${{ vars.WEB_APP_NAME }} \
            --resource-group ${{ vars.RG_NAME }} \
            --container-image-name ${{ vars.ACR_LOGIN_SERVER }}/taskmanager-backend:$IMAGE_TAG \
            --container-registry-url https://${{ vars.ACR_LOGIN_SERVER }}
