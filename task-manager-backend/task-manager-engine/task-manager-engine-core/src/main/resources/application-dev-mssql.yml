spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 4
      minimum-idle: 2
      idle-timeout: 500000
      max-lifetime: 1200000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        generate_statistics: false
    show-sql: false

  flyway:
    enabled: false

logging:
  level:
    root: WARN
    io.github.balasis.taskmanager: DEBUG
    io.github.balasis.taskmanager.engine.monitoring: INFO
    org.springframework: WARN
    org.springframework.boot.web.embedded: INFO
    org.springframework.transaction.interceptor: WARN
