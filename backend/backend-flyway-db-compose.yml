# separate MSSQL instance for dev-flyway-mssql profile (tests Flyway migrations locally)
services:
  mssql-flyway:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskmanager_mssql_flyway
    restart: always
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${FLYWAY_DB_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - mssql-flyway-data:/var/opt/mssql

volumes:
  mssql-flyway-data:
