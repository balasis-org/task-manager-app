# dev-h2: in-memory H2 database, no Flyway, schema auto-created by Hibernate.
# fastest feedback loop — no Docker needed, just run the boot app.
spring:
  jpa:
    hibernate:
      ddl-auto: create     # drops + recreates schema every restart
    properties:
      hibernate:
        generate_statistics: false
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true

  flyway:
    enabled: false

  datasource:
    url: jdbc:h2:mem:devDB
    driver-class-name: org.h2.Driver
    username: user
    password: pass
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 500000
      max-lifetime: 1200000
      connection-timeout: 30000

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

logging:
  level:
    root: WARN
    io.github.balasis.taskmanager: DEBUG
    io.github.balasis.taskmanager.engine.monitoring: INFO
    org.springframework: WARN
    org.springframework.boot.web.embedded: INFO
    org.springframework.transaction.interceptor: WARN
