# prod-azuresql: Azure SQL via managed identity, Flyway migrations,
# restricted actuator endpoints, no SQL logging.
spring:
  jpa:
    hibernate:
      ddl-auto: validate   # schema managed by Flyway only
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    io.github.balasis.taskmanager: INFO
    io.github.balasis.taskmanager.engine.monitoring: INFO
    org.springframework: WARN
    org.springframework.boot.web.embedded: INFO
    org.springframework.transaction.interceptor: WARN
    com.azure.identity: WARN
    com.azure: WARN
    org.hibernate: WARN
