spring:
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
  flyway:
    enabled: false

app:
  jwt-secret-name: TASKMANAGER-JWT-SECRET
  security-guard:
    max-concurrent-requests: 3
    hourly-request-budget: 500

management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    io.github.balasis.taskmanager: INFO
    io.github.balasis.taskmanager.engine.monitoring: INFO
    org.springframework: WARN
    org.springframework.boot.web.embedded: INFO
    com.azure: WARN
