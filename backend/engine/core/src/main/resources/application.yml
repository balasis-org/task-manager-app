# shared base config — all profiles inherit this.
# profile-specific overrides live in application-{profile}.yml.
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev-h2}
  servlet:
    multipart:
      max-file-size: 100MB       # per-file limit (TEAMS_PRO max = 50 MB, extra headroom)
      max-request-size: 550MB    # total multipart envelope (10 files × 50 MB + overhead)
  data:
    web:
      pageable:
        max-page-size: 50
  jpa:
    properties:
      hibernate:
        use_nationalized_character_data: true    # NVARCHAR for Azure SQL unicode
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

    open-in-view: false    # no lazy loading outside tx — prevents accidental N+1
  jackson:
    time-zone: UTC
  task:
    scheduling:
      pool:
        size: 2    # 2 threads: long-running CommentAnalysisDrainer won't block fast drainers
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: beans, health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: WARN
    io.github.balasis.taskmanager: INFO
    io.github.balasis.taskmanager.engine.monitoring: INFO
    org.springframework: WARN
    org.springframework.boot.web.embedded: INFO
    org.springframework.transaction.interceptor: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    com.azure: WARN
    com.azure.monitor.opentelemetry: WARN
    com.zaxxer.hikari: WARN
    io.netty: WARN
    reactor: WARN
    org.flywaydb: WARN

app:
  jwt-secret-name: TASKMANAGER-JWT-SECRET    # Key Vault secret name (prod) or env var (dev)
  download-threads: 15                       # thread pool for parallel blob downloads
  public-url: ${APP_PUBLIC_URL:http://localhost:5173}   # used for CORS and absolute URLs
