# Test profile: in-memory H2 with Hibernate-managed schema.
# Used by @DataJpaTest and @SpringBootTest integration tests.
spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:testDB;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
